<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pfand Flip! – ペットボトルフリックゲーム</title>
    <meta name="description" content="ペットボトルを弾いてPfandポイントを貯めろ！ドイツのスーパーでクーポンをゲット！">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka:wght@400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- Title Screen -->
    <div id="titleScreen" class="screen active">
        <div class="title-container">
            <div class="title-bottle-icon">🍾</div>
            <h1 class="game-title">PFAND<br><span class="title-flip">FLIP!</span></h1>
            <p class="subtitle">ペットボトルを弾いてPfandポイントを貯めろ！</p>
            <button id="startBtn" class="btn-primary">
                <span class="btn-icon">▶</span>
                <span>START</span>
            </button>
            <div class="title-instructions">
                <div class="instruction-item">
                    <span class="instruction-icon">👆</span>
                    <span>ボトルをクリックして弾く</span>
                </div>
                <div class="instruction-item">
                    <span class="instruction-icon">🔥</span>
                    <span>連続ヒットでコンボボーナス</span>
                </div>
                <div class="instruction-item">
                    <span class="instruction-icon">🏪</span>
                    <span>スーパーでクーポンGET!</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Game HUD -->
    <div id="gameHUD" class="screen">
        <div class="hud-top">
            <div class="hud-score">
                <div class="hud-label">PFAND</div>
                <div id="scoreDisplay" class="hud-value">0</div>
                <div class="hud-unit">ct</div>
            </div>
            <div class="hud-combo" id="comboDisplay" style="opacity:0">
                <span id="comboCount">0</span>
                <span class="combo-label">COMBO!</span>
            </div>
            <div class="hud-lives">
                <div class="hud-label">LIVES</div>
                <div id="livesDisplay" class="hud-hearts">❤️❤️❤️</div>
            </div>
        </div>
    </div>

    <!-- Game Over / Supermarket Screen -->
    <div id="resultScreen" class="screen">
        <div class="result-container" id="resultContainer">
            <!-- Phase 1: Conveyor belt animation -->
            <div id="conveyorPhase" class="result-phase active">
                <h2 class="conveyor-title">Pfandautomat</h2>
                <div class="conveyor-machine">
                    <div class="machine-slot">
                        <div class="slot-opening"></div>
                        <div id="conveyorBottle" class="conveyor-bottle">🍾</div>
                    </div>
                    <div class="machine-display">
                        <div class="scanning-line"></div>
                        <span id="machineText">Bitte Flasche einwerfen...</span>
                    </div>
                    <div class="machine-lights">
                        <span class="light light-1"></span>
                        <span class="light light-2"></span>
                        <span class="light light-3"></span>
                    </div>
                </div>
                <p class="conveyor-subtitle">ドイツのスーパーに運ばれています...</p>
            </div>

            <!-- Phase 2: Coupon reveal -->
            <div id="couponPhase" class="result-phase">
                <div class="coupon-card" id="couponCard">
                    <div class="coupon-header">
                        <div class="coupon-logo">🏪</div>
                        <div class="coupon-store">SUPER<span class="store-highlight">MARKT</span></div>
                    </div>
                    <div class="coupon-divider">
                        <span class="scissors">✂️</span>
                    </div>
                    <div class="coupon-body">
                        <div class="coupon-label">Pfandbon</div>
                        <div class="coupon-amount" id="couponAmount">0,00 €</div>
                        <div class="coupon-bottles" id="couponBottles">ボトル: 0本</div>
                        <div class="coupon-date" id="couponDate"></div>
                    </div>
                    <div class="coupon-barcode" id="couponBarcode">
                        <!-- Generated by JS -->
                    </div>
                    <div class="coupon-footer">
                        <span>Gültig bis: <span id="couponExpiry"></span></span>
                    </div>
                    <div class="coupon-stats">
                        <div class="stat">
                            <div class="stat-value" id="statMaxCombo">0</div>
                            <div class="stat-label">最大コンボ</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="statFlicks">0</div>
                            <div class="stat-label">フリック数</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="statRank">F</div>
                            <div class="stat-label">ランク</div>
                        </div>
                    </div>
                </div>
                <button id="retryBtn" class="btn-primary btn-retry">
                    <span class="btn-icon">🔄</span>
                    <span>NOCHMAL!</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Floating particles container -->
    <div id="particles"></div>

    <script src="game.js"></script>
</body>
</html>
